<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>生菜重量計算</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: Arial;
    padding: 10px;
    background: #f5f5f5;
}

h2 { text-align: center; }

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th, td {
    border: 1px solid #ddd;
    padding: 8px;
    text-align: center;
}

input {
    width: 100%;
    padding: 6px;
    font-size: 18px;
    box-sizing: border-box;
}

.item {
    text-align: left;
}

.result {
    font-weight: bold;
}

/* 狀態 */
tr.error {
    background: #f8d7da;
    color: #721c24;
}

tr.done {
    background: #d4edda;
    color: #155724;
}

/* 懸浮按鈕 */
.fab {
    position: fixed;
    right: 15px;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    color: white;
    border: none;
    font-size: 22px;
}

#copyBtn { bottom: 80px; background: #28a745; }
#clearBtn { bottom: 15px; background: #dc3545; }
</style>
</head>

<body>

<h2>🥬 生菜重量計算</h2>

<table>
<thead>
<tr>
<th>品項</th>
<th>總重kg</th>
<th>件數</th>
<th>苔重kg</th>
<th>實秤kg</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<button id="copyBtn" class="fab" onclick="copyText()">📋</button>
<button id="clearBtn" class="fab" onclick="clearAll()">🗑️</button>

<script>
const items = [
{name:"紅捲生菜", icon:"🔴🥬"},
{name:"綠捲生菜", icon:"🟢🥬"},
{name:"紅火焰生菜", icon:"🔴🔥"},
{name:"綠火焰生菜", icon:"🟢🔥"},
{name:"紅橡木生菜", icon:"🔴🌿"},
{name:"綠橡木生菜", icon:"🟢🌿"},
{name:"奶油波士頓生菜", icon:"🧈🥬"},
{name:"羽衣甘藍", icon:"🥬✨"},
{name:"紅包心生菜", icon:"🔴🥬"},
{name:"紅蘿蔓", icon:"🔴🥬"},
{name:"歐芹", icon:"🌿"}
];

const tbody = document.getElementById("tableBody");

// 建表格
items.forEach((item, i) => {
    const tr = document.createElement("tr");

    tr.innerHTML =
        '<td class="item">'+item.icon+' '+item.name+'</td>' +
        '<td><input type="number" min="0" step="0.1" id="weight'+i+'"></td>' +
        '<td><input type="number" min="0" step="1" id="count'+i+'"></td>' +
        '<td><input type="number" value="1.8" id="tare'+i+'" readonly></td>' +
        '<td class="result" id="result'+i+'">0.00</td>';

    tbody.appendChild(tr);
});

// 監聽
document.addEventListener("input", calc);

// 計算
function calc() {
    items.forEach((_, i) => {

        let count = parseInt(document.getElementById("count"+i).value) || 0;
        let weight = parseFloat(document.getElementById("weight"+i).value) || 0;
        let tare = parseFloat(document.getElementById("tare"+i).value) || 0;

        const row = document.getElementById("result"+i).parentNode.parentNode;
        const el = document.getElementById("result"+i);

        row.classList.remove("error","done");

        if (weight > 0 && count === 0) {
            el.innerText = "⚠️";
            el.style.color = "red";
            row.classList.add("error");
            return;
        }

        let result = weight - (tare * count);

        if (weight < (tare * count)) {
            el.innerText = "0.00";
            el.style.color = "red";
            row.classList.add("error");
            return;
        }

        el.innerText = result.toFixed(2);
        el.style.color = result > 0 ? "green" : "#999";

        if (result > 0) row.classList.add("done");
    });
}

// 複製
function copyText() {
    let output = "";

    items.forEach((item, i) => {
        let count = parseInt(document.getElementById("count"+i).value);
        let weight = parseFloat(document.getElementById("weight"+i).value);
        let tare = parseFloat(document.getElementById("tare"+i).value);

        if (!count) return;

        let result = weight - (tare * count);
        if (result < 0) result = 0;

        output += item.name + count + "件\n";
        output += "實秤：" + result.toFixed(2) + "kg\n\n";
    });

    if (!output) {
        alert("沒有資料");
        return;
    }

    navigator.clipboard.writeText(output);
    alert("已複製");
}

// 清除
function clearAll() {
    if (!confirm("確定要清除全部資料嗎？")) return;

    items.forEach((_, i) => {
        document.getElementById("weight"+i).value = "";
        document.getElementById("count"+i).value = "";
        document.getElementById("result"+i).innerText = "0.00";
    });
}
</script>

</body>
</html>
