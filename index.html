<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>生菜重量計算</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: Arial;
    padding: 10px;
    background: #f5f5f5;
}

h2 {
    text-align: center;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th, td {
    border: 1px solid #ddd;
    padding: 10px;
    text-align: center;
}

input {
    width: 80px;
    padding: 6px;
    font-size: 16px;
}

.result {
    font-weight: bold;
    color: green;
}

.item {
    text-align: left;
    font-size: 16px;
}

button {
    cursor: pointer;
    margin-top: 15px;
    padding: 10px 20px;
    font-size: 16px;
}
</style>
</head>

<body>

<h2>🥬 生菜重量計算</h2>

<table>
<tr>
<th>品項</th>
<th>總重kg</th>
<th>件數</th>
<th>實秤kg</th>
</tr>

<tbody id="tableBody"></tbody>
</table>

<button onclick="copyText()">📋 一鍵複製</button>

<script>
const items = [
{name:"紅捲生菜", icon:"🔴🥬"},
{name:"綠捲生菜", icon:"🟢🥬"},
{name:"紅火焰生菜", icon:"🔴🔥"},
{name:"綠火焰生菜", icon:"🟢🔥"},
{name:"紅橡木生菜", icon:"🔴🌿"},
{name:"綠橡木生菜", icon:"🟢🌿"},
{name:"奶油波士頓生菜", icon:"🧈🥬"},
{name:"羽衣甘藍", icon:"🥬✨"},
{name:"紅包心生菜", icon:"🔴🥬"},
{name:"紅蘿蔓", icon:"🔴🥬"},
{name:"歐芹", icon:"🌿"}
];

// 建立表格
const tbody = document.getElementById("tableBody");

items.forEach((item, i) => {
    tbody.innerHTML += `
    <tr>
        <td class="item">${item.icon} ${item.name}</td>
        <td><input type="number" min="0" step="0.1" id="weight${i}" oninput="calc()" onkeydown="nextField(event, ${i})"></td>
        <td>
            <input type="number" min="0" step="1" id="count${i}" 
                   oninput="this.value=this.value.replace(/[^0-9]/g,''); calc();" 
                   onkeydown="nextField(event, ${i})">
        </td>
        <td class="result" id="result${i}">0.00</td>
    </tr>
    `;
});

// 計算
function calc() {
    items.forEach((_, i) => {
        let count = parseInt(document.getElementById("count"+i).value);
        let weight = parseFloat(document.getElementById("weight"+i).value);

        if (isNaN(count)) count = 0;
        if (isNaN(weight)) weight = 0;

        let result = weight - (1.8 * count);
        if (result < 0) result = 0;

        const el = document.getElementById("result"+i);
        el.innerText = result.toFixed(2);
        el.style.color = result === 0 ? "red" : "green";
    });
}

// Enter 跳欄位
function nextField(e, i) {
    if (e.key === "Enter") {
        const activeId = document.activeElement.id;
        if (activeId === "weight"+i) {
            document.getElementById("count"+i).focus();
        } else {
            const nextWeight = document.getElementById("weight"+(i+1));
            if (nextWeight) nextWeight.focus();
        }
    }
}

// 一鍵複製報表
function copyText() {
    let output = "";

    items.forEach((item, i) => {
        let count = parseInt(document.getElementById("count"+i).value);
        let weight = parseFloat(document.getElementById("weight"+i).value);

        if (isNaN(count) || count === 0) return;
        if (isNaN(weight)) weight = 0;

        let result = weight - (1.8 * count);
        if (result < 0) result = 0;

        output += `${item.name}${count}件\n`;
        output += `實秤：${weight}(總重)-1.8(苔重)*${count}= ${result.toFixed(2)}kg\n\n`;
    });

    navigator.clipboard.writeText(output);
    alert("已複製！");
}
</script>

</body>
</html>
