<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>生菜重量計算</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: Arial;
    padding: 10px;
    background: #f5f5f5;
}

h2 { text-align: center; }

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

@media (max-width: 600px) {
    table, thead, tbody, th, td, tr {
        display: block;
    }

    tr {
        margin-bottom: 10px;
        border: 1px solid #ddd;
        padding: 5px;
        background: #fff;
    }

    th {
        display: none;
    }

    td {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border: none;
        border-bottom: 1px solid #eee;
        padding: 6px 4px;
    }

    td::before {
        content: attr(data-label);
        font-weight: bold;
    }
}

th, td {
    border: 1px solid #ddd;
    padding: 8px;
    text-align: center;
    word-break: break-word;
}

input {
    width: 100%;
    padding: 6px;
    font-size: 16px;
    box-sizing: border-box;
}

tr.error {
    background: #f8d7da;
    color: #721c24;
}

tr.done {
    background: #d4edda;
    color: #155724;
}

tr.error input, tr.done input {
    background: transparent;
    color: inherit;
    border-color: #ccc;
}

tr.hasValue input {
    background: #444;
    color: #fff;
    border-color: #666;
}

.result { font-weight: bold; }
.item { text-align: left; }

/* 懸浮按鈕 */
.fab {
    position: fixed;
    right: 15px;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    color: white;
    border: none;
    font-size: 20px;
    cursor: pointer;
}

#copyBtn { bottom: 80px; background: #28a745; }
#clearBtn { bottom: 15px; background: #dc3545; }


</style>
</head>

<body>
<h2>🥬 生菜重量計算</h2>

<table>
<tr>
<th>品項</th>
<th>總重kg</th>
<th>件數</th>
<th>苔重kg</th>
<th>實秤kg</th>
</tr>
<tbody id="tableBody"></tbody>
</table>

<!-- 懸浮按鈕 -->
<button id="copyBtn" class="fab" onclick="copyText()">📋</button>
<button id="clearBtn" class="fab" onclick="clearAll()">🗑️</button>

<script>
const items = [
{name:"紅捲生菜", icon:"🔴🥬"},
{name:"綠捲生菜", icon:"🟢🥬"},
{name:"紅火焰生菜", icon:"🔴🔥"},
{name:"綠火焰生菜", icon:"🟢🔥"},
{name:"紅橡木生菜", icon:"🔴🌿"},
{name:"綠橡木生菜", icon:"🟢🌿"},
{name:"奶油波士頓生菜", icon:"🧈🥬"},
{name:"羽衣甘藍", icon:"🥬✨"},
{name:"紅包心生菜", icon:"🔴🥬"},
{name:"紅蘿蔓", icon:"🔴🥬"},
{name:"歐芹", icon:"🌿"}
];

const tbody = document.getElementById("tableBody");

// 建立表格
items.forEach((item, i) => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
        <td class="item" data-label="品項">${item.icon} ${item.name}</td>
        <td data-label="總重kg"><input type="number" min="0" step="0.1" id="weight${i}"></td>
        <td data-label="件數"><input type="number" min="0" step="1" id="count${i}"></td>
        <td data-label="苔重kg"><input type="number" value="1.8" id="tare${i}" readonly></td>
        <td class="result" data-label="實秤kg" id="result${i}">0.00</td>
    `;
    tbody.appendChild(tr);
});

// 計算
function calc() {
    items.forEach((_, i) => {
        let count = parseInt(document.getElementById("count"+i).value) || 0;
        let weight = parseFloat(document.getElementById("weight"+i).value) || 0;
        let tare = parseFloat(document.getElementById("tare"+i).value) || 0;

        count = Math.max(0, count);
        weight = Math.max(0, weight);

        const row = document.getElementById("result"+i).closest("tr");
        row.classList.remove("error","done");

        const el = document.getElementById("result"+i);

        if (weight > 0 && count === 0) {
            el.innerText = "⚠️";
            el.style.color = "red";
            row.classList.add("error");
            return;
        }

        const result = weight - (tare * count);

        if (weight < (tare * count)) {
            el.innerText = "0.00";
            el.style.color = "red";
            row.classList.add("error");
            return;
        }

        el.innerText = result.toFixed(2);
        el.style.color = result > 0 ? "green" : "#999";

        if (result > 0) row.classList.add("done");
    });
}

// 綁定事件
items.forEach((_, i) => {
    document.addEventListener("input", (e) => {
        if (e.target.id === "weight"+i || e.target.id === "count"+i) {
            calc();
        }
    });
});

// 複製
function copyText() {
    let output = "";

    items.forEach((item, i) => {
        let count = parseInt(document.getElementById("count"+i).value);
        let weight = parseFloat(document.getElementById("weight"+i).value);
        let tare = parseFloat(document.getElementById("tare"+i).value);

        if (!count) return;

        let result = weight - (tare * count);
        if (result < 0) result = 0;

        output += `${item.name}${count}件
`;
        output += `實秤：${result.toFixed(2)}kg

`;
    });

    if (!output) return alert("沒有資料");

    navigator.clipboard.writeText(output);
    alert("已複製");
}

// 清除（防呆）
function clearAll() {
    if (!confirm("確定要清除全部資料嗎？")) return;

    items.forEach((_, i) => {
        document.getElementById("weight"+i).value = "";
        document.getElementById("count"+i).value = "";
        document.getElementById("result"+i).innerText = "0.00";
    });
}
</script>

</body>
</html>
